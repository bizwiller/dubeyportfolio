<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suman Dubey – Professional Portfolio</title>

<style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
    header { background: #1a73e8; color: #fff; padding: 20px; text-align: center; }
    .tabs { display: flex; background: #fff; border-bottom: 2px solid #ddd; overflow-x: auto; }
    .tabs button { flex: 1; padding: 14px; border: none; background: #fff; cursor: pointer; font-size: 16px; border-right: 1px solid #eee; }
    .tabs button.active { background: #1a73e8; color: #fff; font-weight: bold; }
    .content { padding: 25px; background: #fff; margin: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; }
    ul { line-height: 1.8; }
</style>

<script>
// ======== PROJECT DATA (EDIT THIS ONLY TO ADD NEW PROJECTS) ========
const projectData = {
    cloud: [
        "Azure & AWS cloud modernization initiatives",
        "Enterprise landing zone setup and governance",
        "Cloud migration planning, execution, and stabilization",
        "Automation using serverless (Lambda, Azure Functions)"
    ],
    data: [
        "ETL pipelines using Fabric, Databricks, and Spark",
        "Delta Lake ingestion and data quality frameworks",
        "Real-time streaming using Kafka",
        "dbt Core modeling for enterprise analytics"
    ],
    cyber: [
        "Risk assessment and vulnerability remediation",
        "Security governance across cloud and on-prem platforms",
        "Incident response alignment with SOC teams",
        "Compliance with ISO, APRA, and financial regulations"
    ],
    governance: [
        "ITSM & ITIL-based operational governance",
        "Incident, problem, change & release lifecycle ownership",
        "Executive reporting, dashboards, and RCA governance",
        "Vendor and stakeholder management"
    ],
    service: [
        "Major incident management and war-room leadership",
        "Hypercare stabilization and BAU transition",
        "Cross-functional coordination across engineering & operations",
        "Continuous improvement and service reliability uplift"
    ],
    others: [
        "AI-driven automation & content creation",
        "Smart City analytics platform development",
        "Portfolio of GitHub projects and prototypes",
        "Mentoring teams in cloud, data, and operations excellence"
    ]
};

// ======== RENDER PROJECTS ========
function renderProjects() {
    for (const section in projectData) {
        const list = document.getElementById(section + "-list");
        projectData[section].forEach(item => {
            const li = document.createElement("li");
            li.textContent = item;
            list.appendChild(li);
        });
    }
}

// ======== TAB SWITCHING ========
function openTab(tabName) {
    var i, content, tabs;
    content = document.getElementsByClassName("content");
    for (i = 0; i < content.length; i++) content[i].style.display = "none";

    tabs = document.getElementsByClassName("tab-button");
    for (i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");

    document.getElementById(tabName).style.display = "block";
    event.currentTarget.classList.add("active");
}

window.onload = renderProjects;
</script>

</head>
<body>

<header>
    <h1>Suman Dubey</h1>
    <p>Technology Delivery • Cloud • Data • Cybersecurity • Governance • Service Excellence</p>
</header>

<div class="tabs">
    <button class="tab-button active" onclick="openTab('cloud')">Cloud Projects</button>
    <button class="tab-button" onclick="openTab('data')">DATA / ETL</button>
    <button class="tab-button" onclick="openTab('cyber')">Cybersecurity</button>
    <button class="tab-button" onclick="openTab('governance')">Governance</button>
    <button class="tab-button" onclick="openTab('service')">Service Delivery</button>
    <button class="tab-button" onclick="openTab('others')">Others</button>
</div>

<!-- CLOUD -->
<div id="cloud" class="content" style="display:block;">
    <h2>Cloud Projects</h2>
    <ul id="cloud-list"></ul>
</div>

<!-- DATA -->
<div id="data" class="content" style="display:none;">
    <h2>DATA / ETL</h2>
    <ul id="data-list"></ul>
</div>

<!-- CYBER -->
<div id="cyber" class="content" style="display:none;">
    <h2>Cybersecurity – Vulnerabilities & Risk</h2>
    <ul id="cyber-list"></ul>
</div>

<!-- GOVERNANCE -->
<div id="governance" class="content" style="display:none;">
    <h2>Governance</h2>
    <ul id="governance-list"></ul>
</div>

<!-- SERVICE DELIVERY -->
<div id="service" class="content" style="display:none;">
    <h2>Service Delivery</h2>
    <ul id="service-list"></ul>
</div>

<!-- OTHERS -->
<div id="others" class="content" style="display:none;">
    <h2>Others</h2>
    <ul id="others-list"></ul>
</div>

</body>
</html>
